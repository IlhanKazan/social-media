spring:
  application:
    name: social-api-test
  flyway:
    enabled: true
    clean-disabled: false

  task:
    execution:
      pool:
        core-size: 1
        max-size: 1

app:
  jwt:
    secret: "test-secret-must-be-at-least-32-bytes-long-for-jjwt-to-work"
    access-ttl-ms: 900000
    refresh-ttl-ms: 2592000000
  cors:
    allowed-origins:
      - "*"
  cloudinary:
    cloud-name: "test-cloud"
    api-key: "test-key"
    api-secret: "test-secret"
