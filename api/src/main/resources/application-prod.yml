logging:
  level:
    root: WARN
    com.ilhankazan.social: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

spring:
  jpa:
    properties:
      hibernate:
        generate_statistics: false
  jackson:
    deserialization:
      fail-on-unknown-properties: true

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

server:
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
    include-exception: false
  # Not native: Tomcat's RemoteIpValve only walks past hops matching its private-IP
  # regex, so with Cloudflare in front of Traefik it resolves getRemoteAddr() to
  # Cloudflare's public edge IP, not the real client. ClientIpResolver does this
  # correctly (CF-Connecting-IP, gated on the immediate peer being our own trusted proxy).
  forward-headers-strategy: none

app:
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:https://invalid-must-be-set}
  auth:
    cookie:
      # SameSite=None because client and api are likely cross-site on Render
      # (*.onrender.com is a public suffix). Switch to Lax only if both are
      # served from one registrable domain. CSRF is then covered by the Origin
      # allowlist check on /auth/refresh and /auth/logout.
      same-site: ${AUTH_COOKIE_SAMESITE:None}
      secure: ${AUTH_COOKIE_SECURE:true}
      domain: ${AUTH_COOKIE_DOMAIN:}
