spring:
  application:
    name: social-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/social}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    database-platform: com.ilhankazan.social.config.PostgreSQLCitextDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_batch_fetch_size: 20
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
      file-size-threshold: 1MB
  jackson:
    deserialization:
      fail-on-unknown-properties: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-must-be-at-least-32-bytes-long-please-change}
    access-ttl-ms: ${JWT_ACCESS_TTL_MS:900000}        # 15 min
    refresh-ttl-ms: ${JWT_REFRESH_TTL_MS:2592000000}  # 30 days
  auth:
    cookie:
      name: ${AUTH_COOKIE_NAME:refresh_token}
      path: ${AUTH_COOKIE_PATH:/api/v1/auth}
      same-site: ${AUTH_COOKIE_SAMESITE:Lax}
      secure: ${AUTH_COOKIE_SECURE:false}
      domain: ${AUTH_COOKIE_DOMAIN:}
  cors:
    allowed-origins:
      - http://localhost:5173
      - https://${RENDER_FRONTEND_HOST:localhost}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  email:
    enabled: ${EMAIL_ENABLED:false}
    provider: resend
    from-address: ${EMAIL_FROM:}
    from-name: ${EMAIL_FROM_NAME:SocialHan}
    resend-api-key: ${RESEND_API_KEY:}
    daily-cap: ${EMAIL_DAILY_CAP:90}
    monthly-cap: ${EMAIL_MONTHLY_CAP:2800}
    app-name: ${EMAIL_APP_NAME:SocialHan}
    logo-url: ${EMAIL_LOGO_URL:}
  moderation:
    enabled: ${MODERATION_ENABLED:true}
    openai-api-key: ${OPENAI_API_KEY:}
    threshold-default: 0.7
    thresholds:
      hate: 0.5
      hate/threatening: 0.5
      harassment: 0.6
      harassment/threatening: 0.5
      self-harm: 0.5
      self-harm/intent: 0.5
      self-harm/instructions: 0.5
      sexual: 0.7
      sexual/minors: 0.0
      violence: 0.7
      violence/graphic: 0.6
    blocked-terms-path: "moderation/bad-words.txt"
  bot:
    enabled: ${BOT_ENABLED:false}
    openai-api-key: ${OPENAI_API_KEY:}
    openai-model: ${BOT_OPENAI_MODEL:gpt-5.4-mini-2026-03-17}
    cadence-seconds: ${BOT_CADENCE_SECONDS:60}
    daily-quota: ${BOT_DAILY_QUOTA:10}
    account-count: ${BOT_ACCOUNT_COUNT:3}
    min-interval-minutes: ${BOT_MIN_INTERVAL_MINUTES:120}
    max-interval-minutes: ${BOT_MAX_INTERVAL_MINUTES:360}
    active-hours-enabled: ${BOT_ACTIVE_HOURS_ENABLED:false}
    active-hours-start: ${BOT_ACTIVE_HOURS_START:7}
    active-hours-end: ${BOT_ACTIVE_HOURS_END:23}
