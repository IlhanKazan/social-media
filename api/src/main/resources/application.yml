spring:
  application:
    name: social-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/social}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    database-platform: com.ilhankazan.social.config.PostgreSQLCitextDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
      file-size-threshold: 1MB
  jackson:
    deserialization:
      fail-on-unknown-properties: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-must-be-at-least-32-bytes-long-please-change}
    access-ttl-ms: ${JWT_ACCESS_TTL_MS:900000}        # 15 min
    refresh-ttl-ms: ${JWT_REFRESH_TTL_MS:2592000000}  # 30 days
  cors:
    allowed-origins:
      - http://localhost:5173
      - https://${RENDER_FRONTEND_HOST:localhost}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  email:
    enabled: ${EMAIL_ENABLED:false}
    provider: resend
    from-address: ${EMAIL_FROM:noreply@yourdomain.com}
    from-name: ${EMAIL_FROM_NAME:MicroBlog}
    resend-api-key: ${RESEND_API_KEY:}
    daily-cap: ${EMAIL_DAILY_CAP:90}
    monthly-cap: ${EMAIL_MONTHLY_CAP:2800}
