services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: social
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["127.0.0.1:5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/social
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-dev-secret-must-be-at-least-32-bytes-long-please-change}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SPRING_PROFILES_ACTIVE: local
      # OS env overrides profile yaml via relaxed binding. Set APP_BOT_ENABLED=false
      # to bring the stack up without bot accounts (lets MockDataSeeder populate).
      APP_BOT_ENABLED: ${APP_BOT_ENABLED:-true}
    ports: ["8080:8080"]

  # Load testing — runs only with: docker compose --profile loadtest run --rm k6 run /scripts/feed.js
  k6:
    image: grafana/k6:latest
    profiles: ["loadtest"]
    depends_on: [api]
    environment:
      BASE_URL: http://api:8080
    volumes:
      - ./tests/load:/scripts

  # Security scanning — runs only with: docker compose --profile security run --rm zap <zap-*.py ...>
  zap:
    image: zaproxy/zap-stable:latest
    profiles: ["security"]
    depends_on: [api]
    volumes:
      - ./docs/security:/zap/wrk:rw

volumes:
  postgres_data:
