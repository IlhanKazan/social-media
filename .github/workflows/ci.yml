name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  api:
    name: Build & Test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Backend Tests and Verify
        run: |
          cd api
          ./mvnw -B verify

  client:
    name: Client Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: |
          cd client
          npm ci

      - name: Typecheck
        run: |
          cd client
          npm run typecheck

      - name: Test
        run: |
          cd client
          npm run test -- --run

      - name: Build
        run: |
          cd client
          npm run build

      # Lint is report-only: the baseline has pre-existing violations, so it
      # must not block PRs. Typecheck + tests are the real client gate.
      - name: Lint (report-only)
        continue-on-error: true
        run: |
          cd client
          npm run lint
